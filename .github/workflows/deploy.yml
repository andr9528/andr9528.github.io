name: Deploy Site to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'Resume/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  RESUME_PROJECT: "./Resume/Resume.Frontend/Resume.Frontend.csproj"
  TARGET_FRAMEWORK: "net10.0-browserwasm"
  PUBLISH_DIR: "./Resume/Resume.Frontend/bin/Release/net10.0-browserwasm/publish/wwwroot"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout including Resume submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore workloads
        run: dotnet workload restore ${{ env.RESUME_PROJECT }}

      - name: Publish Uno WASM
        run: >
          dotnet publish ${{ env.RESUME_PROJECT }}
          -c Release
          -f ${{ env.TARGET_FRAMEWORK }}

      - name: Prepare Pages artifact
        run: |
          mkdir -p ./site
          cp -r ${{ env.PUBLISH_DIR }}/* ./site/
          touch ./site/.nojekyll
          cp ./site/index.html ./site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4